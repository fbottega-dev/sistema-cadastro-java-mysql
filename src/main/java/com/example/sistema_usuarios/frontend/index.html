<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Login</h2>

        <button type="submit">Entrar</button>
    </form>
    <p>Não tem conta? <a href="register.html">Registrar</a></p>

    <script src="script.js"></script>
</body>
</html>
